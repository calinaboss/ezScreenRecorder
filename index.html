<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sito</title>
<meta property="og:title" content="sito">
<style>
body {
  background-color: gray;
  font-family: Arial, sans-serif;
  font-size: 16px;
  color: white;
  padding: 20px;
}
h1 {
  color: white;
}
p {
  color: white;
}


.btn {
  padding: 6px 12px;
  margin-right: 8px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  border: none;
  border-radius: 4px;
  transition: background-color 0.2s;
}
.btn-start {
  background-color: #000000;
  color: white;
}
.btn-start:hover {
  background-color: #000000;
}
.btn-stop {
  background-color: #dc3545;
  color: white;
}
.btn-stop:hover {
  background-color: #c82333;
}
.btn-download {
  background-color: #000000;
  color: white;
  display: none; 
}
.btn-download:hover {
  background-color: #000000;
}
button:disabled {
  background-color: #6c757d !important;
  cursor: not-allowed;
  opacity: 0.6;
}
#stato {
  font-style: italic;
  color: #e0e0e0;
  margin-top: 15px;
}
</style>
</head>
<body>

<h1 style="width: 664px; min-height: 104px;">welcome to my screen recorder using electron</h1>
<p style="width: 685px; min-height: 40px;">screen record now.</p>

<div>
  <button id="startBtn" class="btn btn-start">Start</button>
  <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
  <button id="downloadBtn" class="btn btn-download">Scarica</button>
</div>

<p id="stato">Pronto per registrare</p>
<p id="demo"></p>

<script>
  const { ipcRenderer } = require('electron');

  let mediaRecorder;
  let recordedChunks = [];
  let videoBuffer;

  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const statoText = document.getElementById('stato');

 
  startBtn.addEventListener('click', async () => {
    const sources = await ipcRenderer.invoke('get-sources');
    const primarySource = sources[0]; 

    if (!primarySource) {
      statoText.innerText = "Errore: Nessuno schermo rilevato.";
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          mandatory: {
            chromeMediaSource: 'desktop',
            chromeMediaSourceId: primarySource.id,
            minWidth: 1280,
            maxWidth: 1920,
            minHeight: 720,
            maxHeight: 1080
          }
        }
      });

      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
      recordedChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

  
      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm; codecs=vp9' });
        const arrayBuffer = await blob.arrayBuffer();
        videoBuffer = new Uint8Array(arrayBuffer);

        downloadBtn.style.display = 'inline-block'; 
        statoText.innerText = "registrazione completata clicca su scarica";
      };

      mediaRecorder.start();
      
      startBtn.disabled = true;
      stopBtn.disabled = false;
      downloadBtn.style.display = 'none'; 
      statoText.innerText = "registrazione in corso..";

    } catch (error) {
      console.error(error);
      statoText.innerText = "Impossibile avviare la registrazione.";
    }
  });


  stopBtn.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
      
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
  });

 
  downloadBtn.addEventListener('click', async () => {
    if (!videoBuffer) return;

  
    const salvato = await ipcRenderer.invoke('save-dialog', videoBuffer);
    
    if (salvato) {
      downloadBtn.style.display = 'none'; 
      statoText.innerText = "Video salvato con successo";
      videoBuffer = null; 
    }
  });
</script>
</body>
</html>
